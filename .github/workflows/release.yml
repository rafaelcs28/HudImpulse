name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/keystore.jks

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: /tmp/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_SRC" "hud-impulse-${VERSION}.apk"
          echo "APK_PATH=hud-impulse-${VERSION}.apk" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HUD Impulse ${{ github.ref_name }}"
          body: |
            ## HUD Impulse ${{ github.ref_name }}

            Instale o APK abaixo no sistema multimídia do Haval.
          files: ${{ env.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
