<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>HUD Impulse — Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #ccc; font-family: monospace; padding: 24px; }
  h1 { color: #4FC3F7; font-size: 18px; margin-bottom: 20px; }
  h2 { color: #888; font-size: 13px; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* HUD canvas — 480×240 exibido em 2× via CSS */
  #hud {
    display: block;
    width: 960px;
    height: 480px;
    image-rendering: pixelated;
    border: 1px solid #333;
  }

  .controls {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 960px;
  }
  .ctrl { display: flex; flex-direction: column; gap: 4px; }
  .ctrl label { font-size: 12px; color: #888; }
  .ctrl input[type=range] { accent-color: #4FC3F7; }
  .ctrl .val { font-size: 13px; color: #eee; }

  .presets { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .presets button {
    background: #222; border: 1px solid #444; color: #ccc;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .presets button:hover { background: #333; border-color: #4FC3F7; color: #fff; }

  .nav-section { margin-top: 24px; display: flex; gap: 16px; flex-wrap: wrap; }
  .nav-card { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .nav-card label { color: #666; font-size: 11px; }
  .nav-card canvas { border: 1px solid #222; background: #000; }
</style>
</head>
<body>
<h1>HUD Impulse — Preview</h1>

<canvas id="hud" width="480" height="240"></canvas>

<div class="presets">
  <button onclick="preset(60,60,0,25)">Cidade EV (60)</button>
  <button onclick="preset(110,110,2500,55)">Rodovia ICE (110)</button>
  <button onclick="preset(85,80,1800,0)">Acima do limite</button>
  <button onclick="preset(70,0,0,-38)">Regen (-38%)</button>
  <button onclick="preset(140,110,5200,80)">Redline!</button>
  <button onclick="preset(0,0,0,0)">Idle</button>
</div>

<div class="controls">
  <div class="ctrl">
    <label>Velocidade (km/h)</label>
    <input type="range" id="s_speed" min="0" max="200" value="92" oninput="draw()">
    <span class="val" id="v_speed">92</span>
  </div>
  <div class="ctrl">
    <label>Limite TSR (0 = sem limite)</label>
    <input type="range" id="s_limit" min="0" max="160" value="80" oninput="draw()">
    <span class="val" id="v_limit">80</span>
  </div>
  <div class="ctrl">
    <label>RPM motor ICE (0 = motor desligado)</label>
    <input type="range" id="s_rpm" min="0" max="6000" step="100" value="1200" oninput="draw()">
    <span class="val" id="v_rpm">1200</span>
  </div>
  <div class="ctrl">
    <label>Energia EV (negativo = regen)</label>
    <input type="range" id="s_energy" min="-100" max="100" value="32" oninput="draw()">
    <span class="val" id="v_energy">32</span>
  </div>
  <div class="ctrl">
    <label>Fonte do limite de velocidade</label>
    <select id="s_source" onchange="draw()" style="background:#222;color:#ccc;border:1px solid #444;padding:4px 8px;border-radius:4px;">
      <option value="here">HERE Maps (borda azul)</option>
      <option value="tsr">TSR câmera (borda vermelha)</option>
    </select>
  </div>
</div>

<h2>Setas de navegação</h2>
<div class="nav-section" id="nav-section"></div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function parseColor(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function rgba(hex,a){ const [r,g,b]=parseColor(hex); return `rgba(${r},${g},${b},${a})`; }

// ── Draw HUD ─────────────────────────────────────────────────────────────────
function draw() {
  const speedKmh    = +document.getElementById('s_speed').value;
  const limitKmh    = +document.getElementById('s_limit').value;
  const engineRpm   = +document.getElementById('s_rpm').value;
  const energyPct   = +document.getElementById('s_energy').value;

  document.getElementById('v_speed').textContent  = speedKmh;
  document.getElementById('v_limit').textContent  = limitKmh || '—';
  document.getElementById('v_rpm').textContent    = engineRpm || '—';
  document.getElementById('v_energy').textContent = energyPct ? `${energyPct}%` : '—';

  const canvas = document.getElementById('hud');
  const ctx    = canvas.getContext('2d');
  const W = 480, H = 240;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  // ── Left panel: navigation placeholder ──────────────────────────────────
  const navData = {
    arrow: 4, side: 2, distance: 270, road: 'Av. Paulista',
    eventType: 4, turnAngle: 45, turnNumber: -1
  };
  drawNavPanel(ctx, navData, 0, 0, 240, H);

  // ── Right panel: speed ──────────────────────────────────────────────────
  const limitSource = document.getElementById('s_source').value;
  drawSpeedPanel(ctx, 240, 0, 240, H, speedKmh, limitKmh, engineRpm, energyPct, limitSource);
}

// ── Nav panel ────────────────────────────────────────────────────────────────
function drawNavPanel(ctx, data, x, y, w, h) {
  // Arrow
  const arrowSize = 85, arrowH = 97;
  const arrowX = x + w/2, arrowY = y + 12 + arrowH/2;
  ctx.save();
  ctx.translate(arrowX, arrowY);
  drawArrowShape(ctx, data.arrow, data.side, arrowSize, '#fff', data.turnAngle);
  ctx.restore();

  // Distance
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 23px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(formatDist(data.distance), x + w/2, y + 12 + arrowH + 8 + 18);

  // Street
  ctx.font = '16px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(data.road, x + w/2, y + 12 + arrowH + 8 + 18 + 20);
}

function formatDist(m) {
  if (m >= 1000) { const km = m/1000; return km>=10 ? km.toFixed(0)+' km' : km.toFixed(1)+' km'; }
  return m+' m';
}

// ── Speed panel ──────────────────────────────────────────────────────────────
function drawSpeedPanel(ctx, x, y, w, h, speedKmh, limitKmh, engineRpm, energyPct, limitSource = 'here') {
  const cx = x + w/2;
  const MAX_RPM = 6000;

  // Over limit calc
  const overPct = (limitKmh > 0 && speedKmh > limitKmh)
    ? (speedKmh - limitKmh)*100/limitKmh : 0;

  const speedCenterY = y + h/2;

  // ── Inner decorative circle ──
  ctx.beginPath();
  ctx.arc(cx, speedCenterY, h*0.26, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── Energy arc (inner, r=0.36h) ──
  // Consumo: 9h+15° → topo → 3h  (horário)
  // Regen:   9h-15° → baixo → 3h (anti-horário) — ambos saem do lado esquerdo
  if (energyPct !== 0) {
    const abs      = Math.abs(energyPct);
    const r        = h * 0.30;
    const off      = Math.PI / 12;       // 15°
    const maxSweep = Math.PI - off;      // 165° — de 9h±15° até 3h
    const sweep    = (abs/100) * maxSweep;
    const color    = energyPct < 0   ? '#52B788'
                   : energyPct > 75  ? '#C05555'
                   : energyPct > 50  ? '#C87941'
                   : energyPct > 30  ? '#C9A84C'
                   :                   '#4A86C8';

    ctx.beginPath();
    if (energyPct > 0) {
      ctx.arc(cx, speedCenterY, r, Math.PI + off, Math.PI + off + sweep);
    } else {
      ctx.arc(cx, speedCenterY, r, Math.PI - off, Math.PI - off - sweep, true);
    }
    ctx.strokeStyle = rgba(color, 0.82);
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.stroke();

    // % energia na posição 9h
    ctx.fillStyle = rgba(color, 0.88);
    ctx.font = `bold ${(h * 0.085).toFixed(0)}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText((energyPct > 0 ? '▲ ' : '▼ ') + abs.toFixed(0) + '%', cx - r + 4, speedCenterY);
  }

  // ── RPM arc (outer, r=0.40h) ──
  if (engineRpm > 0) {
    const frac  = clamp(engineRpm, 0, MAX_RPM) / MAX_RPM;
    const sweep = frac * Math.PI;
    const r     = h * 0.35;
    const color = frac > 0.83 ? '#C05555'
                : frac > 0.50 ? '#C87941'
                :               '#4A86C8';

    ctx.beginPath();
    ctx.arc(cx, speedCenterY, r, Math.PI + Math.PI/12, Math.PI + Math.PI/12 + sweep);
    ctx.strokeStyle = rgba(color, 0.90);
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // ── Velocidade ──
  const speedColor = overPct > 20 ? '#FF4444' : overPct > 0 ? '#FFEE44' : '#FFFFFF';
  const speedSize  = (h * 0.35).toFixed(0);
  ctx.fillStyle  = speedColor;
  ctx.font       = `bold ${speedSize}px sans-serif`;
  ctx.textAlign  = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(speedKmh), cx, speedCenterY);

  // ── km/h + placa ──
  const rowY   = speedCenterY + h * 0.21;
  const signR  = 15;
  const unitSz = (h * 0.074).toFixed(0);
  ctx.font     = `bold ${unitSz}px sans-serif`;
  ctx.textBaseline = 'middle';

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.textAlign = 'center';
  ctx.fillText('km/h', cx, rowY);

  if (limitKmh > 0) {
    const scx = x + signR + 4;   // left edge of panel ≈ screen center
    ctx.beginPath();
    ctx.arc(scx, rowY, signR, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(scx, rowY, signR, 0, Math.PI*2);
    ctx.strokeStyle = limitSource === 'tsr' ? '#CC0000' : '#4A86C8';
    ctx.lineWidth = signR * 0.25;
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.font = `bold ${limitKmh >= 100 ? 14 : 16}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(String(limitKmh), scx, rowY);
  }

  // ── RPM label (abaixo da placa, centro) ──
  if (engineRpm > 0) {
    const energyArcR2 = h * 0.30;
    const labelY = Math.max(rowY + signR * 2 + 8, speedCenterY + energyArcR2 + h * 0.085);
    const frac2   = clamp(engineRpm, 0, MAX_RPM) / MAX_RPM;
    const rpmCol  = frac2 > 0.83 ? '#C05555' : frac2 > 0.50 ? '#C87941' : '#4A86C8';
    const rpmDisp = engineRpm >= 1000
      ? String(Math.floor(engineRpm / 100) * 100)
      : String(engineRpm);
    ctx.font = `bold ${(h * 0.065).toFixed(0)}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = rgba(rpmCol, 0.85);
    ctx.fillText(rpmDisp + ' rpm', cx, labelY);
  }

  ctx.textBaseline = 'alphabetic';
}

// ── Presets ───────────────────────────────────────────────────────────────────
function preset(speed, limit, rpm, energy) {
  document.getElementById('s_speed').value  = speed;
  document.getElementById('s_limit').value  = limit;
  document.getElementById('s_rpm').value    = rpm;
  document.getElementById('s_energy').value = energy;
  draw();
}

// ── Arrow drawings (simplified versions) ────────────────────────────────────
function drawArrowShape(ctx, eventType, side, size, color, angle) {
  const r  = size * 0.40;
  const lw = size * 0.13;
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if (eventType === 0 || eventType === 1) {
    // Reto
    ctx.beginPath();
    ctx.moveTo(0, r); ctx.lineTo(0, -r*0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(-r*0.35, -r*0.35); ctx.lineTo(r*0.35, -r*0.35);
    ctx.closePath(); ctx.fill();
  } else if (eventType === 3 || eventType === 4) {
    // Curva esq/dir
    const flip = (eventType === 4 || side === 2) ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(-flip*r*0.4, r);
    ctx.lineTo(-flip*r*0.4, -r*0.1);
    ctx.arcTo(-flip*r*0.4, -r*0.7, flip*r*0.4, -r*0.7, r*0.6);
    ctx.lineTo(flip*r*0.4, -r*0.2);
    ctx.stroke();
    // ponta seta
    ctx.beginPath();
    ctx.moveTo(flip*r*0.4, -r);
    ctx.lineTo(flip*r*0.05, -r*0.45);
    ctx.lineTo(flip*r*0.75, -r*0.45);
    ctx.closePath(); ctx.fill();
  } else if (eventType === 6) {
    // Retorno
    ctx.beginPath();
    ctx.moveTo(r*0.3, r);
    ctx.lineTo(r*0.3, 0);
    ctx.arc(0, 0, r*0.3, 0, -Math.PI, true);
    ctx.lineTo(-r*0.3, r);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.3, r*0.2); ctx.lineTo(r*0.65, r*0.7); ctx.lineTo(-r*0.05, r*0.7);
    ctx.closePath(); ctx.fill();
  } else {
    // Seta genérica para cima
    ctx.beginPath();
    ctx.moveTo(0, r); ctx.lineTo(0, -r*0.3); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -r); ctx.lineTo(-r*0.35, -r*0.3); ctx.lineTo(r*0.35, -r*0.3);
    ctx.closePath(); ctx.fill();
  }
}

// ── Nav arrow gallery ─────────────────────────────────────────────────────────
const arrows = [
  { label: 'Reto',          fn: (c,s) => { const ct=c.getContext('2d'); drawArrowCtx(ct,0,3,s,'#fff'); } },
  { label: 'Curva direita', fn: (c,s) => { const ct=c.getContext('2d'); drawArrowCtx(ct,4,2,s,'#fff'); } },
  { label: 'Curva esq.',    fn: (c,s) => { const ct=c.getContext('2d'); drawArrowCtx(ct,3,1,s,'#fff'); } },
  { label: 'Retorno',       fn: (c,s) => { const ct=c.getContext('2d'); drawArrowCtx(ct,6,1,s,'#fff'); } },
];
function drawArrowCtx(ctx,ev,side,s,color){
  ctx.clearRect(0,0,s,s);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,s,s);
  ctx.save(); ctx.translate(s/2,s/2);
  drawArrowShape(ctx,ev,side,s,color,0);
  ctx.restore();
}
const navSec = document.getElementById('nav-section');
arrows.forEach(a => {
  const card=document.createElement('div'); card.className='nav-card';
  const lbl=document.createElement('label'); lbl.textContent=a.label;
  const cv=document.createElement('canvas'); cv.width=cv.height=100;
  a.fn(cv,100);
  card.appendChild(cv); card.appendChild(lbl);
  navSec.appendChild(card);
});

// ── Animate ──────────────────────────────────────────────────────────────────
draw();
</script>
</body>
</html>
